name: E16 LMS CI & Supply-Chain Security

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  id-token: write  # Required for keyless image signing via Cosign

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: e16_test
          POSTGRES_USER: e16
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Software Composition Analysis (SCA)
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt --desc on --ignore-vuln PYSEC-2025-183
        
    - name: Verify Application Load
      env:
        APP_ENV: testing
        SECRET_KEY: ci-test-key
        DATABASE_URL: postgresql://e16:testpass@localhost:5432/e16_test
      run: |
        python scripts/verify.py
        
    - name: Run Tests
      env:
        APP_ENV: testing
        SECRET_KEY: ci-test-key
        DATABASE_URL: postgresql://e16:testpass@localhost:5432/e16_test
      run: |
        pytest --cov=e16_app --cov-report=xml --cov-fail-under=70

  security:
    name: Container Security & Supply-Chain
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build local container image
      run: |
        docker build -t e16-lms:latest .

    - name: Run Trivy Vulnerability Scanner (Image Scan)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'e16-lms:latest'
        format: 'table'
        exit-code: '0'  # In real enterprise pipeline, set to 1 on HIGH/CRITICAL CVEs
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Generate Software Bill of Materials (SBOM)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'e16-lms:latest'
        format: 'cyclonedx'
        output: 'sbom.json'

    - name: Upload SBOM Artifact
      uses: actions/upload-artifact@v3
      with:
        name: sbom-cyclonedx
        path: sbom.json

    - name: Install Cosign (Image Signing)
      uses: sigstore/cosign-installer@v3.1.1

    - name: Verify Cosign Installation
      run: |
        cosign version
        # Note: In a live registry environment, you would log in and run:
        # cosign sign --yes e16-lms:latest (utilizing the OIDC token for keyless signing)
