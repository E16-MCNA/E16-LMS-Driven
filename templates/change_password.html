{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div style="font-size: 3rem; margin-bottom: 16px;">🔐</div>
      <h1>Đổi mật khẩu</h1>
      <div style="background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 8px; padding: 16px; margin-top: 16px; text-align: left;">
        <p style="margin: 0; font-size: 0.9rem; color: var(--text-main);">
          ⚠️ Bạn cần đổi mật khẩu trước khi tiếp tục sử dụng hệ thống. Mật khẩu mới phải có ít nhất 8 ký tự.
        </p>
      </div>
    </div>
    <form method="post" action="{{ url_for('auth.change_password') }}" class="form-group">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" name="new_password" placeholder="••••••••" required minlength="8">
      </div>
      <div class="form-group">
        <label>Xác nhận mật khẩu mới</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Đổi mật khẩu</button>
    </form>
    <div style="text-align: center; margin-top: 24px;">
      <a href="{{ url_for('auth.logout') }}" style="color: var(--text-muted); font-size: 0.9rem;">Đăng xuất</a>
    </div>
  </div>
</div>
{% endblock %}
