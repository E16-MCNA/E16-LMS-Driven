{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 650px; margin: 40px auto; padding: 32px; border: 1px solid var(--card-border); background: var(--card); backdrop-filter: blur(10px); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);">
  
  <div style="margin-bottom: 28px; text-align: left;">
    <h1 style="font-size: 1.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; display: flex; align-items: center; gap: 10px;">
      ➕ Tạo người dùng mới
    </h1>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin: 0; line-height: 1.5;">
      Cấp tài khoản mới cho nhân viên hoặc học viên trong hệ thống.
    </p>
  </div>

  <form action="{{ url_for('hoc_vu.create_account') }}" method="post" class="form-group" style="display: flex; flex-direction: column; gap: 20px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
      <label style="font-weight: 600; color: var(--text-main); font-size: 0.9rem;">
        Email <span style="color: var(--danger);">*</span>
      </label>
      <input type="email" name="email" placeholder="nhap.email@e16.edu.vn" required 
             style="width: 100%; padding: 12px 16px; background: rgba(3, 6, 20, 0.6); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-main); font-size: 0.95rem; transition: var(--transition);">
    </div>

    <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
      <label style="font-weight: 600; color: var(--text-main); font-size: 0.9rem;">
        Số điện thoại
      </label>
      <input type="tel" name="phone" placeholder="Ví dụ: 0912345678" 
             style="width: 100%; padding: 12px 16px; background: rgba(3, 6, 20, 0.6); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-main); font-size: 0.95rem; transition: var(--transition);">
    </div>

    <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
      <label style="font-weight: 600; color: var(--text-main); font-size: 0.9rem;">
        Vai trò hệ thống <span style="color: var(--danger);">*</span>
      </label>
      <select name="role" required 
              style="width: 100%; padding: 12px 16px; background: rgba(3, 6, 20, 0.6); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-main); font-size: 0.95rem; transition: var(--transition); cursor: pointer;">
        <option value="student" style="color: #0f172a; background: #ffffff;">Student (Học viên)</option>
        <option value="teacher" style="color: #0f172a; background: #ffffff;">Teacher (Giảng viên)</option>
        <option value="le_tan" style="color: #0f172a; background: #ffffff;">Lễ tân</option>
        <option value="ke_toan" style="color: #0f172a; background: #ffffff;">Kế toán</option>
        {% if current_user.role == 'admin' %}
        <option value="hoc_vu" style="color: #0f172a; background: #ffffff;">Học vụ</option>
        <option value="admin" style="color: #0f172a; background: #ffffff;">Admin</option>
        {% endif %}
      </select>
    </div>

    <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
      <label style="font-weight: 600; color: var(--text-main); font-size: 0.9rem;">
        Đăng ký khóa học ngay
      </label>
      <select name="course_id" 
              style="width: 100%; padding: 12px 16px; background: rgba(3, 6, 20, 0.6); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-main); font-size: 0.95rem; transition: var(--transition); cursor: pointer;">
        <option value="" style="color: #0f172a; background: #ffffff;">-- Không đăng ký ngay --</option>
        {% for c in courses %}
        <option value="{{ c.id }}" style="color: #0f172a; background: #ffffff;">{{ c.title }}</option>
        {% endfor %}
      </select>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin: 4px 0 0 0; line-height: 1.4;">
        Lựa chọn khóa học này sẽ tự động ghi danh (enroll) học sinh mới tạo vào khóa học.
      </p>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 12px; padding-top: 20px; border-top: 1px solid var(--card-border);">
      <a href="{{ url_for('hoc_vu.dashboard') if current_user.role == 'hoc_vu' else url_for('admin.list_users') }}" 
         class="btn btn-outline" style="padding: 10px 24px; border-radius: 8px; font-weight: 600; transition: var(--transition); text-decoration: none; text-align: center; line-height: 1.5;">
        Hủy bỏ
      </a>
      <button type="submit" class="btn btn-primary" 
              style="padding: 10px 24px; border-radius: 8px; font-weight: 600; transition: var(--transition); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">
        Xác nhận tạo tài khoản
      </button>
    </div>

  </form>
</div>
{% endblock %}
