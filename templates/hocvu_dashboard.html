{% extends "base.html" %}
{% block content %}
<header class="top-header">
  <div>
    <h1>Bảng điều khiển Học vụ</h1>
    <p>Tổng quan hệ thống — duyệt khoá học, hoạt động.</p>
  </div>
</header>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px;">
  <div class="card" style="text-align: center; padding: 24px;">
    <div style="font-size: 2rem; margin-bottom: 8px;">📋</div>
    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">{{ pending_courses }}</div>
    <div style="font-size: 0.85rem; color: var(--text-muted);">Khoá chờ duyệt</div>
  </div>
  <div class="card" style="text-align: center; padding: 24px;">
    <div style="font-size: 2rem; margin-bottom: 8px;">📚</div>
    <div style="font-size: 2rem; font-weight: 800; color: var(--text-main);">{{ active_courses }}</div>
    <div style="font-size: 0.85rem; color: var(--text-muted);">Khoá đang hoạt động</div>
  </div>
</div>

<div style="display: flex; gap: 12px; margin-bottom: 32px;">
  <a href="{{ url_for('hoc_vu.pending_courses') }}" class="btn btn-primary">📋 Duyệt khoá học ({{ pending_courses }})</a>
</div>
{% endblock %}
