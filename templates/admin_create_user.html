{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto; padding: 32px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);">
  <header style="margin-bottom: 28px; text-align: center;">
    <h1 style="font-size: 1.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;">Tạo người dùng mới</h1>
    <p style="color: var(--text-muted); font-size: 0.95rem;">Cấp tài khoản mới cho nhân viên hoặc học viên trong hệ thống.</p>
  </header>

  <form action="{{ url_for('admin.create_user') }}" method="POST" id="create-user-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div style="margin-bottom: 20px;">
      <label for="email" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main);">Email <span style="color: var(--danger);">*</span></label>
      <input type="email" id="email" name="email" required placeholder="nhap.email@e16.edu.vn"
             style="width: 100%; padding: 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); color: var(--text-main); font-size: 1rem; transition: border-color 0.2s;">
    </div>

    <div style="margin-bottom: 20px;">
      <label for="phone" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main);">Số điện thoại</label>
      <input type="text" id="phone" name="phone" placeholder="Ví dụ: 0912345678"
             style="width: 100%; padding: 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); color: var(--text-main); font-size: 1rem; transition: border-color 0.2s;">
    </div>

    <div style="margin-bottom: 24px;">
      <label for="role" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main);">Vai trò hệ thống <span style="color: var(--danger);">*</span></label>
      <select id="role" name="role" required onchange="toggleCourseSelection()"
              style="width: 100%; padding: 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); color: var(--text-main); font-size: 1rem; cursor: pointer;">
        <option value="student" selected style="color: #0f172a; background: #ffffff;">Student (Học viên)</option>
        <option value="teacher" style="color: #0f172a; background: #ffffff;">Teacher (Giáo viên)</option>
        <option value="hoc_vu" style="color: #0f172a; background: #ffffff;">Học vụ (Academic Affairs)</option>
        <option value="le_tan" style="color: #0f172a; background: #ffffff;">Lễ tân (Receptionist)</option>
        <option value="ke_toan" style="color: #0f172a; background: #ffffff;">Kế toán (Accountant)</option>
        <option value="admin" style="color: #0f172a; background: #ffffff;">Admin (Quản trị viên)</option>
      </select>
    </div>

    <div id="course-selection-container" style="margin-bottom: 24px; padding: 16px; border: 1px dashed var(--primary); border-radius: 8px; background: rgba(59, 130, 246, 0.03); transition: all 0.3s ease;">
      <label for="course_id" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main);">Đăng ký khóa học ngay</label>
      <select id="course_id" name="course_id"
              style="width: 100%; padding: 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); color: var(--text-main); font-size: 1rem; cursor: pointer;">
        <option value="" style="color: #0f172a; background: #ffffff;">-- Không đăng ký ngay --</option>
        {% for course in courses %}
          <option value="{{ course.id }}" style="color: #0f172a; background: #ffffff;">{{ course.title }}</option>
        {% endfor %}
      </select>
      <p style="font-size: 0.82rem; color: var(--text-muted); margin-top: 8px; margin-bottom: 0;">Lựa chọn khóa học này sẽ tự động ghi danh học sinh mới tạo vào khóa học.</p>
    </div>

    <div style="display: flex; gap: 12px; margin-top: 32px;">
      <a href="{{ url_for('admin.list_users') }}" class="btn btn-outline" style="flex: 1; text-align: center; padding: 12px;">Hủy bỏ</a>
      <button type="submit" class="btn btn-primary" style="flex: 2; padding: 12px;">Xác nhận tạo tài khoản</button>
    </div>
  </form>
</div>

<script>
  function toggleCourseSelection() {
    const roleSelect = document.getElementById('role');
    const courseContainer = document.getElementById('course-selection-container');
    const courseSelect = document.getElementById('course_id');

    if (roleSelect.value === 'student') {
      courseContainer.style.display = 'block';
    } else {
      courseContainer.style.display = 'none';
      courseSelect.value = ''; // Reset selection
    }
  }

  // Initial call
  document.addEventListener('DOMContentLoaded', function() {
    toggleCourseSelection();
  });
</script>
{% endblock %}
